# Serves the SPA and reverse-proxies the API to the backend container so the
# browser talks to a single origin (the session cookie is same-origin).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → backend. No trailing slash on proxy_pass: the full /api/v1/... URI
    # is forwarded unchanged, which is what the Go router expects.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets are content-addressed and safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached: it is the entry point that references the
    # current asset hashes, so browsers must revalidate it on every load or a
    # stale copy will point at asset files that no longer exist after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
